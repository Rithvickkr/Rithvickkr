<svg width="450" height="200" viewBox="0 0 450 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages for Rithvickkr">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4"/><stop offset="0.5" stop-color="#6366F1"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="reveal"><rect x="25" y="66" width="400" height="11"><animate attributeName="width" dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" values="0;400"/></rect></clipPath>
    <clipPath id="round"><rect x="25" y="66" width="400" height="11" rx="5.5"/></clipPath>
    <style>
      .fade { animation: rise 0.7s ease both; }
      @keyframes rise { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
      .title { font: 700 18px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #C9D1D9; }
      .lname { font: 600 13px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #C9D1D9; }
      .lpct  { font: 400 13px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #8B949E; }
    </style>
  </defs>
  <rect x="1" y="1" width="448" height="198" rx="12" fill="#0D1117" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="25" y="42" class="title">Most Used Languages</text>
  <rect x="25" y="52" width="52" height="3" rx="1.5" fill="url(#accent)"/>
  <rect x="25" y="66" width="400" height="11" rx="5.5" fill="#21262D"/>
  <g clip-path="url(#round)"><g clip-path="url(#reveal)"><rect x="25.0" y="66" width="317.4" height="11" fill="#3572A5"/><rect x="342.4" y="66" width="58.9" height="11" fill="#f1e05a"/><rect x="401.3" y="66" width="7.3" height="11" fill="#3178c6"/><rect x="408.6" y="66" width="7.1" height="11" fill="#fedf5b"/><rect x="415.8" y="66" width="3.8" height="11" fill="#663399"/><rect x="419.5" y="66" width="2.0" height="11" fill="#555555"/></g></g>
  
    <g class="fade" style="animation-delay:0.2s">
      <circle cx="31" cy="104" r="6" fill="#3572A5"/>
      <text x="45" y="108" class="lname">Python</text>
      <text x="210" y="108" class="lpct" text-anchor="end">79.4%</text>
    </g>
    <g class="fade" style="animation-delay:0.30000000000000004s">
      <circle cx="241" cy="104" r="6" fill="#f1e05a"/>
      <text x="255" y="108" class="lname">JavaScript</text>
      <text x="420" y="108" class="lpct" text-anchor="end">14.7%</text>
    </g>
    <g class="fade" style="animation-delay:0.4s">
      <circle cx="31" cy="132" r="6" fill="#3178c6"/>
      <text x="45" y="136" class="lname">TypeScript</text>
      <text x="210" y="136" class="lpct" text-anchor="end">1.8%</text>
    </g>
    <g class="fade" style="animation-delay:0.5s">
      <circle cx="241" cy="132" r="6" fill="#fedf5b"/>
      <text x="255" y="136" class="lname">Cython</text>
      <text x="420" y="136" class="lpct" text-anchor="end">1.8%</text>
    </g>
    <g class="fade" style="animation-delay:0.6000000000000001s">
      <circle cx="31" cy="160" r="6" fill="#663399"/>
      <text x="45" y="164" class="lname">CSS</text>
      <text x="210" y="164" class="lpct" text-anchor="end">0.9%</text>
    </g>
    <g class="fade" style="animation-delay:0.7s">
      <circle cx="241" cy="160" r="6" fill="#555555"/>
      <text x="255" y="164" class="lname">C</text>
      <text x="420" y="164" class="lpct" text-anchor="end">0.5%</text>
    </g>
</svg>