  <rect x="225" y="33" width="583" height="2" rx="1" fill="url(#acc)" opacity="0.6"><animate attributeName="width" from="0" to="583" dur="1s" begin=".3s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="0;583"/></rect>
