    .ttl{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:800;font-size:25px;fill:#F0F6FC;letter-spacing:2.5px}
  </style>
</defs>
  <text class="num f" x="42" y="44">01</text>
