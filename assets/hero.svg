<svg width="850" height="240" viewBox="0 0 850 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rithvick Kumar">
<defs>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#22D3EE"/><stop offset="0.5" stop-color="#6366F1"/><stop offset="1" stop-color="#A78BFA"/>
  </linearGradient>
  <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="850" y2="0">
    <stop offset="0" stop-color="#22D3EE"/><stop offset="0.25" stop-color="#6366F1"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="0.75" stop-color="#6366F1"/><stop offset="1" stop-color="#22D3EE"/>
    <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="850 0" dur="7s" repeatCount="indefinite"/>
  </linearGradient>
  <style>
    .fade{animation:fi 1s ease both}
    .d1{animation-delay:.15s}.d2{animation-delay:.4s}.d3{animation-delay:.65s}.d4{animation-delay:.9s}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .k{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:600;font-size:13px;fill:#8B949E;letter-spacing:4px}
    .n{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:800;font-size:62px;letter-spacing:1px}
    .t{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:400;font-size:16.5px;fill:#E6EDF3}
    .s{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:400;font-size:13.5px;fill:#8B949E;letter-spacing:.3px}
    .mono{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:800;font-size:200px;fill:none;stroke:url(#flow);stroke-width:1.4}
  </style>
</defs>
  <rect width="850" height="240" fill="#0D1117"/>
  <text class="mono" x="712" y="196" text-anchor="middle" opacity="0.13">RK</text>
  <rect class="fade d1" x="42" y="52" width="3" height="140" fill="url(#acc)"><animate attributeName="height" from="0" to="140" dur="1s" begin=".2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="0;140"/></rect>
  <text class="k fade d1" x="64" y="70">AI / ML  ·  FULL-STACK  ·  BACKEND ENGINEER</text>
  <text class="n fade d2" x="62" y="136" fill="url(#flow)">RITHVICK KUMAR</text>
  <g class="fade d2">
    <rect x="64" y="158" width="356" height="2" rx="1" fill="url(#acc)"><animate attributeName="width" from="0" to="356" dur="1.1s" begin=".5s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="0;356"/></rect>
    <circle cx="430" cy="159" r="3.5" fill="#A78BFA"><animate attributeName="cx" from="82" to="430" dur="1.1s" begin=".5s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="82;430"/></circle>
  </g>
  <text class="t fade d3" x="64" y="192">I ship production AI systems — LLM &amp; RAG pipelines, agents, and the APIs around them.</text>
  <text class="s fade d4" x="64" y="218">B.Tech, NIT Kurukshetra &#8217;26  ·  Gemini CLI contributor  ·  github.com/Rithvickkr</text>
