    .rn{font-family:Georgia, 'Times New Roman', Times, serif;font-weight:400;font-size:15px;font-style:italic;fill:#7C8288}
  </style>
</defs>
  <text class="ttl f" x="42" y="40">TECH STACK</text>
  <rect x="232" y="34" width="542" height="1" fill="#33363A"><animate attributeName="width" from="0" to="542" dur="1s" begin=".3s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="0;542"/></rect>
