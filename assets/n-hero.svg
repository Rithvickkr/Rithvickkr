<svg width="850" height="240" viewBox="0 0 850 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rithvick Kumar">
<defs>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  <linearGradient id="sheen" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="850" y2="0">
    <stop offset="0" stop-color="#8A8F94"/><stop offset="0.25" stop-color="#D8DADE"/><stop offset="0.5" stop-color="#FFFFFF"/><stop offset="0.75" stop-color="#D8DADE"/><stop offset="1" stop-color="#8A8F94"/>
    <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="850 0" dur="8s" repeatCount="indefinite"/>
  </linearGradient>
  <style>
    .fade{animation:fi 1s ease both}.d1{animation-delay:.12s}.d2{animation-delay:.3s}.d3{animation-delay:.55s}.d4{animation-delay:.75s}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .eye{font-family:'Helvetica Neue', Arial, 'Segoe UI', sans-serif;font-weight:600;font-size:12.5px;fill:#7C8288;letter-spacing:5px}
    .name{font-family:Georgia, 'Times New Roman', Times, serif;font-weight:700;font-size:66px;letter-spacing:.5px}
    .tag{font-family:Georgia, 'Times New Roman', Times, serif;font-weight:400;font-size:19px;font-style:italic;fill:#C7CCD1}
    .sub{font-family:'Helvetica Neue', Arial, 'Segoe UI', sans-serif;font-weight:500;font-size:12.5px;fill:#7C8288;letter-spacing:2.4px}
    .mk{font-family:Georgia, 'Times New Roman', Times, serif;font-weight:700;font-size:200px;fill:none;stroke:#33363A;stroke-width:1}
  </style>
</defs>
  <rect width="850" height="240" fill="#0A0A0B"/>
  <text class="mk" x="712" y="196" text-anchor="middle" opacity="0.5">RK</text>
  <text class="eye fade d1" x="42" y="66">AI / ML  —  FULL-STACK  —  BACKEND</text>
  <text class="name fade d2" x="40" y="130" fill="url(#sheen)">Rithvick Kumar</text>
  <rect class="fade d2" x="42" y="152" width="360" height="1" fill="#33363A"><animate attributeName="width" from="0" to="360" dur="1.1s" begin=".5s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" keyTimes="0;1" values="0;360"/></rect>
  <text class="tag fade d3" x="42" y="188">I ship production AI systems — LLM &amp; RAG pipelines, agents, and the APIs.</text>
  <text class="sub fade d4" x="42" y="214">B.TECH, NIT KURUKSHETRA &#8217;26   ·   GEMINI CLI CONTRIBUTOR</text>
  <rect width="850" height="240" fill="#FFFFFF" filter="url(#grain)" opacity="0.035"/>
</svg>