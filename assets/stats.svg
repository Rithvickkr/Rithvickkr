<svg width="450" height="200" viewBox="0 0 450 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub statistics for Rithvickkr">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4"/><stop offset="0.5" stop-color="#6366F1"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <style>
      .fade { animation: rise 0.7s ease both; }
      @keyframes rise { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
      .num { font: 700 26px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #06B6D4; }
      .lbl { font: 400 12px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #8B949E; letter-spacing:.4px; }
      .title { font: 700 18px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif; fill: #C9D1D9; }
    </style>
  </defs>
  <rect x="1" y="1" width="448" height="198" rx="12" fill="#0D1117" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="25" y="42" class="title">Rithvick Kumar · GitHub Stats</text>
  <rect x="25" y="52" width="52" height="3" rx="1.5" fill="url(#accent)"/>
  
    <g class="fade" style="animation-delay:0.15s">
      <text x="95" y="112" class="num" text-anchor="middle">7</text>
      <text x="95" y="132" class="lbl" text-anchor="middle">Total Stars</text>
    </g>
    <g class="fade" style="animation-delay:0.25s">
      <text x="245" y="112" class="num" text-anchor="middle">29</text>
      <text x="245" y="132" class="lbl" text-anchor="middle">Repositories</text>
    </g>
    <g class="fade" style="animation-delay:0.35s">
      <text x="395" y="112" class="num" text-anchor="middle">3</text>
      <text x="395" y="132" class="lbl" text-anchor="middle">Followers</text>
    </g>
    <g class="fade" style="animation-delay:0.45000000000000007s">
      <text x="95" y="172" class="num" text-anchor="middle">189</text>
      <text x="95" y="192" class="lbl" text-anchor="middle">Commits (2026)</text>
    </g>
    <g class="fade" style="animation-delay:0.55s">
      <text x="245" y="172" class="num" text-anchor="middle">16</text>
      <text x="245" y="192" class="lbl" text-anchor="middle">Pull Requests</text>
    </g>
    <g class="fade" style="animation-delay:0.65s">
      <text x="395" y="172" class="num" text-anchor="middle">213</text>
      <text x="395" y="192" class="lbl" text-anchor="middle">Contributions</text>
    </g>
</svg>