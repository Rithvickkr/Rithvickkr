<svg width="850" height="268" viewBox="0 0 850 268" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rithvick Kumar terminal">
<defs>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#39D3EE"/><stop offset="0.5" stop-color="#6366F1"/><stop offset="1" stop-color="#A78BFA"/>
  </linearGradient>
  <style>
    .ln{font-family:'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;font-weight:500;font-size:15px;fill:#E6EDF3;animation:fi .5s ease both}
    @keyframes fi{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
    .grn{fill:#3FB950;font-weight:700}.cmd{fill:#39D3EE;font-weight:700}.arg{fill:#A78BFA}
    .flag{fill:#E3B341}.out{fill:#8B949E}.ylw{fill:#E3B341;font-weight:600}.acc{fill:#39D3EE;font-weight:600}
    .title{font-family:'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;font-weight:500;font-size:13px;fill:#8B949E}
    @keyframes blink{50%{opacity:0}}
    .cur{animation:blink 1.1s steps(1) infinite}
  </style>
</defs>
  <rect x="1" y="1" width="848" height="266" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  <path d="M1 13 A12 12 0 0 1 13 1 L837 1 A12 12 0 0 1 849 13 L849 40 L1 40 Z" fill="#161B22"/>
  <circle cx="24" cy="20" r="6" fill="#FF5F56"/><circle cx="46" cy="20" r="6" fill="#FFBD2E"/><circle cx="68" cy="20" r="6" fill="#27C93F"/>
