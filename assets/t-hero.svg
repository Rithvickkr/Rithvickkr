  <text x="26" y="110" class="ln" style="animation-delay:0.45s"><tspan class="out">Rithvick Kumar — </tspan><tspan class="acc">AI/ML · Full-Stack · Backend Engineer</tspan></text>
  <text x="26" y="140" class="ln" style="animation-delay:0.7s"><tspan class="grn">$</tspan> <tspan class="cmd">cat</tspan> <tspan class="arg">summary.txt</tspan></text>
