<svg width="850" height="246" viewBox="0 0 850 246" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech stack">
<defs>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#22D3EE"/><stop offset="0.5" stop-color="#6366F1"/><stop offset="1" stop-color="#A78BFA"/>
  </linearGradient>
  <style>
    .row{animation:ri .7s ease both}
    @keyframes ri{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    .lab{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:700;font-size:12.5px;fill:#22D3EE;letter-spacing:2px}
    .val{font-family:'Segoe UI', 'Helvetica Neue', Arial, Sans-Serif;font-weight:400;font-size:14.5px;fill:#E6EDF3;letter-spacing:.2px}
  </style>
</defs>
  
  <g class="row" style="animation-delay:0.15s">
    <rect x="42" y="30" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="42">AI / ML</text>
    <text class="val" x="196" y="42">PyTorch · TensorFlow · LangChain · RAG · MCP · Hugging Face · Vertex AI · Ollama</text>
  </g>
  <g class="row" style="animation-delay:0.24s">
    <rect x="42" y="66" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="78">LANGUAGES</text>
    <text class="val" x="196" y="78">Python · TypeScript · JavaScript · Java · C</text>
  </g>
  <g class="row" style="animation-delay:0.32999999999999996s">
    <rect x="42" y="102" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="114">BACKEND</text>
    <text class="val" x="196" y="114">FastAPI · Node.js · Express · WebRTC · WebSockets · OAuth 2.0 · Nginx</text>
  </g>
  <g class="row" style="animation-delay:0.42000000000000004s">
    <rect x="42" y="138" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="150">FRONTEND</text>
    <text class="val" x="196" y="150">React · Next.js · Tailwind CSS · Three.js</text>
  </g>
  <g class="row" style="animation-delay:0.51s">
    <rect x="42" y="174" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="186">DATA</text>
    <text class="val" x="196" y="186">PostgreSQL · SQLite · sqlite-vec · MongoDB · Supabase · Prisma · FAISS · ChromaDB</text>
  </g>
  <g class="row" style="animation-delay:0.6s">
    <rect x="42" y="210" width="8" height="8" rx="2" fill="url(#acc)"/>
    <text class="lab" x="64" y="222">TOOLING</text>
    <text class="val" x="196" y="222">Git · Docker · GitHub Actions · Vercel · Weights &amp; Biases · MLflow</text>
  </g>
</svg>