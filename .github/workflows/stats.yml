name: Generate GitHub Stats

on:
  schedule:
    # Daily at 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate-stats.mjs"
      - ".github/workflows/stats.yml"

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate stat cards
        run: node scripts/generate-stats.mjs
        env:
          # Uses a personal PAT if provided (needed for private-contribution counts),
          # otherwise falls back to the built-in token for public stats.
          GH_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          if git diff --quiet --cached; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh GitHub stats [skip ci]"
            git push
          fi
